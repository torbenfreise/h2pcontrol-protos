syntax = "proto3";

package h2pcontrol.gonogo.v1;

option java_multiple_files = true;
option java_outer_classname = "GoNogoServiceProto";
option java_package = "com.beyerlabs.h2pcontrol.gonogo.v1";

service GoNogoService {
  rpc GetReady(GetReadyRequest) returns (GetReadyResponse);
}

message GetReadyRequest {}

message GetReadyResponse {
  bool ready = 1;
  string reason = 2; // Optionally give a reason why the service isn't ready.
}
