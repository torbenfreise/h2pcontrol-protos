syntax = "proto3";

package h2pcontrol.manager.v1;

option java_multiple_files = true;
option java_outer_classname = "ManagerProto";
option java_package = "h2pcontrol.manager.v1";

service ManagerService {
  rpc RegisterServer(RegisterServerRequest) returns (RegisterServerResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  rpc FetchServers(FetchServersRequest) returns (FetchServersResponse);
}

message FetchServersRequest {}

message HeartbeatRequest {
  int64 timestamp = 2;
}

message HeartbeatResponse {
  bool healthy = 1;
  int64 timestamp = 3;
}

message ServerDefinition {
  string server_name = 1;
  string description = 3;
  string port = 2;
}

message RegisterServerRequest {
  ServerDefinition server = 1;
}

message RegisterServerResponse {
  string result = 1;
}

message FetchServerDefinition {
  string name = 1;
  string description = 2;
  string addr = 3;
}

message FetchServersResponse {
  repeated FetchServerDefinition servers = 1;
}
