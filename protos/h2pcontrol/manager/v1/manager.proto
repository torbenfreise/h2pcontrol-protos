syntax = "proto3";

package h2pcontrol.manager.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "ManagerServiceProto";
option java_package = "com.beyerlabs.h2pcontrol.manager.v1";

service ManagerService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Watch(WatchRequest) returns (stream WatchResponse);
  rpc Log(stream LogRequest) returns (LogResponse);
}

message ServiceDefinition {
  string name = 1;
  string description = 2;
  string address = 3;
}

message ServiceInfo {
  ServiceDefinition definition = 1;
  bool healthy = 2;
  google.protobuf.Timestamp last_seen = 3;
}

message RegisterRequest {
  ServiceDefinition service = 1;
}

message RegisterResponse {}

message ListRequest {}

message ListResponse {
  repeated ServiceInfo services = 1;
}

message WatchRequest {}

message WatchResponse {
  repeated ServiceInfo services = 1;
}

message HeartbeatRequest {
  bool healthy = 1;
}

message HeartbeatResponse {}

enum Level {
  LEVEL_UNSPECIFIED = 0;
  LEVEL_DEBUG = 100;
  LEVEL_INFO = 200;
  LEVEL_WARN = 300;
  LEVEL_ERROR = 400;
}

message LogRequest {
  string service_name = 1;
  Level level = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}
message LogResponse {}
