syntax = "proto3";

package h2pcontrol.lioptec.v1;

option java_multiple_files = true;
option java_outer_classname = "LioptecProto";
option java_package = "h2pcontrol.lioptec.v1";

service LioptecService {
  rpc Connect(ConnectRequest) returns (ConnectResponse);
  rpc SetWavelength(SetWavelengthRequest) returns (SetWavelengthResponse);
  rpc IsReady(IsReadyRequest) returns (IsReadyResponse);
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
}

message ConnectRequest {
  string ip = 1;
  int32 port = 2;
}

message ConnectResponse {
  IsOk result = 1;
}

message SetWavelengthRequest {
  float wavelength = 1;
}

message SetWavelengthResponse {
  IsOk result = 1;
}

message IsReadyRequest {}

message IsReadyResponse {
  IsOk result = 1;
}

message DisconnectRequest {}

message DisconnectResponse {
  IsOk result = 1;
}

message IsOk {
  bool ok = 1;
  string status = 2;
}
